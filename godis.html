<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CANDY SURVEILLANCE</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0a0a;color:#00ff41;font-family:"Courier New",monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
    .header{background:linear-gradient(90deg,#1a0000,#330000,#1a0000);border-bottom:3px solid #ff0000;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;}
    .header h1{font-size:1.8rem;color:#ff0000;text-shadow:0 0 20px #ff0000;letter-spacing:4px;}
    .threat{padding:6px 20px;border-radius:4px;font-weight:900;font-size:1rem;animation:threatPulse 1s infinite;}
    @keyframes threatPulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
    .main{flex:1;display:flex;overflow:hidden;}
    .feed{flex:2;padding:20px;overflow:hidden;display:flex;flex-direction:column;}
    .sidebar{flex:1;border-left:2px solid #333;padding:20px;display:flex;flex-direction:column;gap:15px;}
    .event{padding:12px;border-left:3px solid #00ff41;margin-bottom:8px;background:#0d1a0d;animation:slideIn 0.5s;font-size:0.95rem;line-height:1.5;}
    .event.alert{border-left-color:#ff0000;background:#1a0d0d;}
    .event.warning{border-left-color:#ffaa00;background:#1a150d;}
    .event .time{color:#666;font-size:0.8rem;}
    .event .name{color:#00ddff;font-weight:700;}
    .event .candy{color:#ff69b4;}
    .event .comment{color:#aaa;font-style:italic;margin-top:4px;}
    @keyframes slideIn{from{transform:translateX(-30px);opacity:0;}to{transform:translateX(0);opacity:1;}}
    .stat-box{background:#111;border:1px solid #333;padding:12px;border-radius:4px;}
    .stat-box h3{color:#666;font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
    .stat-box .val{font-size:1.8rem;color:#00ff41;}
    .stat-box .val.danger{color:#ff0000;}
    .leaderboard{background:#111;border:1px solid #333;padding:12px;border-radius:4px;flex:1;overflow:hidden;}
    .leaderboard h3{color:#ff0000;font-size:0.85rem;letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;}
    .lb-entry{display:flex;justify-content:space-between;padding:4px 0;font-size:0.85rem;border-bottom:1px solid #1a1a1a;}
    .lb-entry .rank{color:#666;}
    .lb-entry .n{color:#00ddff;}
    .lb-entry .cnt{color:#ff69b4;font-weight:700;}
    .scanner{height:3px;background:linear-gradient(90deg,transparent,#ff0000,transparent);animation:scan 2s linear infinite;}
    @keyframes scan{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
  </style>
</head>
<body>
  <div class="header">
    <h1>CANDY SURVEILLANCE SYSTEM v4.20</h1>
    <div class="threat" id="threatLevel" style="background:#ff0000;color:white;">THREAT LEVEL: ELEVATED</div>
  </div>
  <div class="scanner"></div>
  <div class="main">
    <div class="feed" id="feed"></div>
    <div class="sidebar">
      <div class="stat-box"><h3>Candies consumed today</h3><div class="val danger" id="totalCount">0</div></div>
      <div class="stat-box"><h3>Estimated sugar intake</h3><div class="val" id="sugarLevel">0g</div></div>
      <div class="stat-box"><h3>Dentist bill forecast</h3><div class="val danger" id="dentist">0 DKK</div></div>
      <div class="leaderboard">
        <h3>Most Wanted Candy Criminals</h3>
        <div id="leaderboard"></div>
      </div>
    </div>
  </div>
<script>
var names=["Marianne","Jakob","Frederik","Sofie","Erik","Hedda","Marlene","Marcus","Emelie","Lotta","Line","Vivi","Sandra","Bjorn","Tina","Karin","Blerta","Ilona"];
var candies=["Snickers","Mars","Twix","KitKat","Daim","Marabou","Geisha","Polly","Plopp","Kexchoklad","Center","Djungelvraal","Turkish Pepper","Salt Sild","Ahlgrens Bilar","Cola Bottles","Gummy Bears","Sour Skittles"];
var reactions=[
  "AGAIN?! This is their {n}th today!",
  "The dentist sends their regards.",
  "That candy had a family.",
  "Sugar levels now classified as a biohazard.",
  "At this rate, the candy bowl will be empty by lunch.",
  "HR has been notified. Just kidding. Or are we?",
  "The candy didn't even get to say goodbye.",
  "This is why we can't have nice things.",
  "Scanning for remorse... none detected.",
  "The screen is judging you. Hard.",
  "That was the LAST {candy}. Hope you're proud.",
  "Fun fact: that candy costs more than your attention span.",
  "Adding to your permanent record.",
  "Your blood sugar called. It wants a divorce.",
  "Plot twist: the candy was a decoy. We're watching you.",
  "Alerting Interpol... just kidding. Maybe."
];
var alerts=[
  "ALERT: Candy bowl structural integrity compromised",
  "WARNING: Sugar consumption exceeding NATO guidelines",
  "NOTICE: The candy bowl filed a restraining order against {name}",
  "SECURITY: Unauthorized hand detected near premium chocolate section",
  "URGENT: Candy supply chain disruption imminent",
  "DEFCON 2: Only {n} candies remaining. Panic authorized.",
  "BREAKING: {name} spotted approaching candy bowl for the {n}th time",
  "INTEL: Satellite imagery confirms candy bowl is 67% depleted"
];

var counts={},total=0,feed=document.getElementById("feed");
function getTime(){
  var now=new Date(),h=String(now.getHours()).padStart(2,"0"),m=String(now.getMinutes()).padStart(2,"0"),s=String(now.getSeconds()).padStart(2,"0");
  return h+":"+m+":"+s;
}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function addEvent(type,html){
  var div=document.createElement("div");
  div.className="event"+(type==="alert"?" alert":type==="warning"?" warning":"");
  div.innerHTML='<span class="time">'+getTime()+'</span> '+html;
  feed.insertBefore(div,feed.firstChild);
  if(feed.children.length>15)feed.removeChild(feed.lastChild);
}

function updateStats(){
  document.getElementById("totalCount").textContent=total;
  document.getElementById("sugarLevel").textContent=(total*12)+"g";
  document.getElementById("dentist").textContent=(total*85).toLocaleString()+" DKK";
  // Update threat level
  var tl=document.getElementById("threatLevel");
  if(total<5){tl.textContent="THREAT LEVEL: LOW";tl.style.background="#00aa00";}
  else if(total<15){tl.textContent="THREAT LEVEL: ELEVATED";tl.style.background="#ffaa00";tl.style.color="#000";}
  else if(total<30){tl.textContent="THREAT LEVEL: HIGH";tl.style.background="#ff6600";tl.style.color="#fff";}
  else if(total<50){tl.textContent="THREAT LEVEL: SEVERE";tl.style.background="#ff0000";}
  else{tl.textContent="THREAT LEVEL: WE ARE ALL DOOMED";tl.style.background="#ff0000";}
  // Leaderboard
  var sorted=Object.entries(counts).sort(function(a,b){return b[1]-a[1];});
  var lb=document.getElementById("leaderboard");lb.innerHTML="";
  for(var i=0;i<Math.min(sorted.length,8);i++){
    var medal=i===0?"\u{1F6A8}":i===1?"\u26A0\uFE0F":i===2?"\u{1F440}":"";
    lb.innerHTML+='<div class="lb-entry"><span class="rank">'+(i+1)+'.</span><span class="n">'+medal+" "+sorted[i][0]+'</span><span class="cnt">'+sorted[i][1]+' pcs</span></div>';
  }
}

function logCandy(){
  var name=pick(names),candy=pick(candies);
  var n=counts[name]=(counts[name]||0)+1;
  total++;
  var reaction=pick(reactions).replace("{n}",n).replace("{candy}",candy);
  addEvent("normal",'<span class="name">'+name+'</span> took a <span class="candy">'+candy+'</span><div class="comment">'+reaction+'</div>');
  updateStats();
}

function logAlert(){
  var name=pick(names),n=Math.floor(Math.random()*20)+5;
  var alert=pick(alerts).replace("{name}",name).replace("{n}",n);
  addEvent("alert",alert);
}

function logWarning(){
  var warnings=[
    "Motion sensor triggered near candy bowl. All units standby.",
    "Thermal scan detects warm hand approaching sector 7 (the candy bowl).",
    "Pattern analysis: candy consumption spikes every Wednesday. Today is Wednesday.",
    "Facial recognition identified repeat offender. Deploying guilt protocol.",
    "Candy bowl weight decreased by 23g in last 60 seconds. Investigating.",
    "Anomaly detected: someone put FRUIT in the candy bowl. Heresy.",
    "The candy bowl is filing an emotional distress claim.",
    "Satellite uplink confirmed: the candy bowl is visible from space (barely)."
  ];
  addEvent("warning",pick(warnings));
}

// Initial events
addEvent("normal","SYSTEM ONLINE. Candy surveillance active. All bowls monitored.");
setTimeout(function(){addEvent("warning","Calibrating sugar detection sensors...");},2000);
setTimeout(function(){logCandy();},4000);

// Regular events
setInterval(function(){
  var r=Math.random();
  if(r<0.55) logCandy();
  else if(r<0.75) logAlert();
  else logWarning();
},5000+Math.random()*3000);

// Extra candy bursts
setInterval(function(){
  logCandy();setTimeout(logCandy,800);setTimeout(logCandy,1600);
  setTimeout(function(){addEvent("alert","CANDY HEIST IN PROGRESS! Multiple subjects detected!");},2200);
},45000);

updateStats();
</script>
</body>
</html>
