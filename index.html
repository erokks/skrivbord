<!DOCTYPE html>
<html lang="sv">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Erik Automation</title>
    <style>
          html, body {
                  margin: 0;
                  height: 100%;
                  background: black;
                  overflow: hidden;
          }
          iframe {
                  width: 100%;
                  height: 100%;
                  border: none;
          }
          #fsOverlay {
                  position: fixed;
                  top: 0; left: 0;
                  width: 100%; height: 100%;
                  background: #000000;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  z-index: 9999;
                  cursor: pointer;
          }
          #fsOverlay span {
                  color: #00ff88;
                  font-family: monospace;
                  font-size: 4rem;
                  text-align: center;
                  text-shadow: 0 0 30px #00ff88;
                  animation: pulse 1.5s infinite;
          }
          @keyframes pulse {
                  0%, 100% { opacity: 1; }
                  50% { opacity: 0.4; }
          }
          #lunchOverlay {
                  position: fixed;
                  top: 0; left: 0;
                  width: 100%; height: 100%;
                  background: black;
                  display: none;
                  z-index: 9998;
                  overflow: hidden;
          }
          .lunch-scroll {
                  position: absolute;
                  white-space: nowrap;
                  font-family: monospace;
                  font-size: 5rem;
                  font-weight: bold;
                  color: #00ff88;
                  text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff8866;
                  animation: scrollLeft 8s linear infinite;
          }
          @keyframes scrollLeft {
                  0% { transform: translateX(100%); }
                  100% { transform: translateX(-100%); }
          }
        </style>
  </head>
  <body>
      <div id="fsOverlay">
            <span>TRYCK FOR FULLSKARM</span>
      </div>div>
    <div id="lunchOverlay"></div>div>
    <iframe id="displayFrame" src="" allow="fullscreen"></iframe>iframe>
  
    <script>
          const overlay = document.getElementById("fsOverlay");
          const lunchOverlay = document.getElementById("lunchOverlay");
          let userActivatedFS = false;

          function buildLunchRows() {
                  lunchOverlay.innerHTML = "";
                  const rowCount = Math.ceil(window.innerHeight / 80);
                  for (let i = 0; i < rowCount; i++) {
                            const row = document.createElement("div");
                            row.className = "lunch-scroll";
                            row.style.top = (i * 80) + "px";
                            row.style.animationDelay = (-i * 0.7) + "s";
                            row.style.animationDuration = (6 + Math.random() * 4) + "s";
                            if (i % 2 === 1) {
                                        row.style.animationDirection = "reverse";
                            }
                            row.textContent = "LUNCH  LUNCH  LUNCH  LUNCH  LUNCH  LUNCH  LUNCH  LUNCH  LUNCH  LUNCH  LUNCH  LUNCH  ";
                            lunchOverlay.appendChild(row);
                  }
          }
          buildLunchRows();

          function isLunchTime() {
                  const now = new Date();
                  const day = now.getDay();
                  const h = now.getHours();
                  const m = now.getMinutes();
                  const time = h * 60 + m;
                  return (day >= 1 && day <= 3) && time >= 705 && time < 735;
          }

          setInterval(function() {
                  if (isLunchTime()) {
                            lunchOverlay.style.display = "block";
                  } else {
                            lunchOverlay.style.display = "none";
                  }
          }, 30000);
          if (isLunchTime()) {
                  lunchOverlay.style.display = "block";
          }

          function goFullscreen() {
                  var el = document.documentElement;
                  if (el.requestFullscreen) {
                            el.requestFullscreen().catch(function() {});
                  } else if (el.webkitRequestFullscreen) {
                            el.webkitRequestFullscreen();
                  } else if (el.msRequestFullscreen) {
                            el.msRequestFullscreen();
                  }
          }

          function isFullscreen() {
                  return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
          }

          overlay.addEventListener("click", function() {
                  goFullscreen();
                  overlay.style.display = "none";
                  userActivatedFS = true;
          });

          function onFSChange() {
                  if (!isFullscreen() && userActivatedFS) {
                            overlay.style.display = "flex";
                  }
          }
          document.addEventListener("fullscreenchange", onFSChange);
          document.addEventListener("webkitfullscreenchange", onFSChange);

          document.addEventListener("click", function() {
                  if (userActivatedFS && !isFullscreen()) {
                            goFullscreen();
                            overlay.style.display = "none";
                  }
          });

          setInterval(function() {
                  if (userActivatedFS && !isFullscreen()) {
                            overlay.style.display = "flex";
                  } else if (isFullscreen()) {
                            overlay.style.display = "none";
                  }
          }, 10000);

          function getCurrentModeURL() {
                  var now = new Date();
                  var day = now.getDay();
                  var hour = now.getHours();
                  var minute = now.getMinutes();
                  var time = hour + minute / 60;
                  var isBetween = function(start, end) { return time >= start && time < end; };

                  if (day === 1 || day === 2) {
                            return isBetween(8.5, 16) ? "dricks.html" : "ai-erik.html";
                  }
                  if (day === 3) {
                            return isBetween(8.5, 16) ? "godis.html" : "ai-erik.html";
                  }
                  if (day === 4 || day === 5) {
                            return "ai-erik.html";
                  }
                  return "helpdesk.html";
          }

          var frame = document.getElementById("displayFrame");
          frame.src = getCurrentModeURL();

          setInterval(function() {
                  var newURL = getCurrentModeURL();
                  var currentFull = new URL(newURL, window.location.href).href;
                  if (frame.src !== currentFull) {
                            frame.src = newURL;
                  }
          }, 60000);
    </script>
  </body>
</html>html>
