<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erik Automation</title>
  <style>
    html,body{margin:0;height:100%;background:black;overflow:hidden;}
    iframe{width:100%;height:100%;border:none;}
    #fsOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;z-index:9999;cursor:pointer;}
    #fsOverlay span{color:#00ff88;font-family:monospace;font-size:4rem;text-align:center;text-shadow:0 0 30px #00ff88;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
    #lunchOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;z-index:9998;overflow:hidden;}
    .lunch-scroll{position:absolute;white-space:nowrap;font-family:monospace;font-size:5rem;font-weight:bold;color:#00ff88;text-shadow:0 0 20px #00ff88,0 0 40px #00ff8866;animation:scrollLeft 8s linear infinite;}
    @keyframes scrollLeft{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
    .ovl{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;}
    .ovl iframe{width:100%;height:100%;border:none;}
    #memeOverlay{z-index:9997;justify-content:center;align-items:center;}
    #memeOverlay iframe{width:100%;height:100%;}
    #tinderOverlay{z-index:9996;}
    #nyheterOverlay{z-index:9995;}
    #bsodOverlay{z-index:9994;}
    #matrixOverlay{z-index:9993;}
    #folksOverlay{z-index:9992;}
    #terminatorOverlay{z-index:9991;}
  </style>
</head>
<body>
  <div id="fsOverlay" onclick="goFS()"><span>TRYCK FOR FULLSCREEN</span></div>
  <div id="lunchOverlay"></div>
  <div id="memeOverlay" class="ovl"></div>
  <div id="tinderOverlay" class="ovl"></div>
  <div id="nyheterOverlay" class="ovl"></div>
  <div id="bsodOverlay" class="ovl"></div>
  <div id="matrixOverlay" class="ovl"></div>
  <div id="folksOverlay" class="ovl"></div>
  <div id="terminatorOverlay" class="ovl"></div>
  <iframe id="mainFrame" src=""></iframe>
<script>
function goFS(){
  var el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  else if(el.msRequestFullscreen)el.msRequestFullscreen();
  document.getElementById("fsOverlay").style.display="none";
}
setInterval(function(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement)
    document.getElementById("fsOverlay").style.display="flex";
},10000);

function loadPage(){
  var now=new Date(),day=now.getDay(),time=now.getHours()*60+now.getMinutes();
  var page="ai-erik.html";
  if(day===1)page="ai-erik.html";
  else if(day===2)page="dricks.html";
  else if(day===3)page="godis.html";
  else if(day===4)page=time<720?"ai-erik.html":"helpdesk.html";
  else if(day===5)page=time<720?"dricks.html":"ai-erik.html";
  document.getElementById("mainFrame").src=page;
}
loadPage();setInterval(loadPage,300000);

function checkLunch(){
  var now=new Date(),day=now.getDay(),time=now.getHours()*60+now.getMinutes();
  var lo=document.getElementById("lunchOverlay");
  if(day>=1&&day<=3&&time>=705&&time<735){
    if(lo.style.display!=="block"){
      lo.style.display="block";lo.innerHTML="";
      for(var i=0;i<8;i++){var d=document.createElement("div");
        d.className="lunch-scroll";d.textContent="LUNCH LUNCH LUNCH LUNCH LUNCH";
        d.style.top=(i*13)+"%";d.style.animationDelay=(i*0.7)+"s";lo.appendChild(d);}
    }
  }else{lo.style.display="none";}
}
setInterval(checkLunch,30000);checkLunch();

// Thats All Folks - 16:00 mon-fri
function checkFolks(){
  var now=new Date(),day=now.getDay(),time=now.getHours()*60+now.getMinutes();
  var fo=document.getElementById("folksOverlay");
  if(day>=1&&day<=5&&time>=960&&time<965){
    if(fo.style.display!=="block"){
      fo.innerHTML='<iframe src="folks.html"></iframe>';fo.style.display="block";
    }
  }else{fo.style.display="none";fo.innerHTML="";}
}
setInterval(checkFolks,30000);checkFolks();

// Terminator boot - 08:30 mon-fri
function checkTerminator(){
  var now=new Date(),day=now.getDay(),time=now.getHours()*60+now.getMinutes();
  var to=document.getElementById("terminatorOverlay");
  if(day>=1&&day<=5&&time>=510&&time<512){
    if(to.style.display!=="block"){
      to.innerHTML='<iframe src="terminator.html"></iframe>';to.style.display="block";
      setTimeout(function(){to.style.display="none";to.innerHTML="";},60000);
    }
  }
}
setInterval(checkTerminator,30000);checkTerminator();

var memes=["https://i.imgflip.com/1bij.jpg","https://i.imgflip.com/26am.jpg","https://i.imgflip.com/9vct.jpg","https://i.imgflip.com/1otk96.jpg","https://i.imgflip.com/2fm6x.jpg","https://i.imgflip.com/3lmzyx.jpg","https://i.imgflip.com/4t0m5.jpg","https://i.imgflip.com/1ur9b0.jpg"];
function showOverlay(id,src,dur){var el=document.getElementById(id);el.innerHTML='<iframe src="'+src+'" style="width:100%;height:100%;border:none"></iframe>';el.style.display="flex";setTimeout(function(){el.style.display="none";el.innerHTML=""},dur)}
function showMeme(){var el=document.getElementById("memeOverlay");var img=memes[Math.floor(Math.random()*memes.length)];el.innerHTML='<img src="'+img+'" style="max-width:90%;max-height:90%;border-radius:12px;box-shadow:0 0 40px rgba(0,0,0,.7)">';el.style.display="flex";setTimeout(function(){el.style.display="none";el.innerHTML=""},8000)}
setInterval(function(){var r=Math.random();if(r<0.02){showOverlay("tinderOverlay","tinder.html",30000)}else if(r<0.04){showOverlay("nyheterOverlay","nyheter.html",15000)}else if(r<0.06){showOverlay("bsodOverlay","bsod.html",18000)}else if(r<0.08){showOverlay("matrixOverlay","matrix.html",20000)}else if(r<0.15){showMeme()}},120000);
</script>
</body>
</html>
