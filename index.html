<!DOCTYPE html>
<html lang="sv">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Pekskärmsväxling – Erik Automation</title>
    <style>
          html, body {
                  margin: 0;
                  height: 100%;
                  background: black;
                  overflow: hidden;
          }
          iframe {
                  width: 100%;
                  height: 100%;
                  border: none;
          }
          #fsOverlay {
                  position: fixed;
                  top: 0; left: 0;
                  width: 100%; height: 100%;
                  background: #000000;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  z-index: 9999;
                  cursor: pointer;
          }
          #fsOverlay span {
                  color: #00ff88;
                  font-family: monospace;
                  font-size: 4rem;
                  text-align: center;
                  text-shadow: 0 0 30px #00ff88;
                  animation: pulse 1.5s infinite;
          }
          @keyframes pulse {
                  0%, 100% { opacity: 1; }
                  50% { opacity: 0.4; }
          }
        </style>
  </head>
  <body>
      <div id="fsOverlay">
            <span>TRYCK FÖR FULLSKÄRM</span>
      </div>div>
    <iframe id="displayFrame" src="" allow="fullscreen"></iframe>iframe>
  
    <script>
          const overlay = document.getElementById("fsOverlay");

          overlay.addEventListener("click", () => {
                  const el = document.documentElement;
                  if (el.requestFullscreen) {
                            el.requestFullscreen();
                  } else if (el.webkitRequestFullscreen) {
                            el.webkitRequestFullscreen();
                  } else if (el.msRequestFullscreen) {
                            el.msRequestFullscreen();
                  }
                  overlay.style.display = "none";
          });

          document.addEventListener("fullscreenchange", () => {
                  if (!document.fullscreenElement) {
                            overlay.style.display = "flex";
                  }
          });
          document.addEventListener("webkitfullscreenchange", () => {
                  if (!document.webkitFullscreenElement) {
                            overlay.style.display = "flex";
                  }
          });

          function getCurrentModeURL() {
                  const now = new Date();
                  const day = now.getDay();
                  const hour = now.getHours();
                  const minute = now.getMinutes();
                  const time = hour + minute / 60;

                  const isBetween = (start, end) => time >= start && time < end;

                  if (day === 1 || day === 2) {
                            return isBetween(8.5, 16) ? "dricks.html" : "ai-erik.html";
                  }

                  if (day === 3) {
                            return isBetween(8.5, 16) ? "godis.html" : "ai-erik.html";
                  }

                  if (day === 4 || day === 5) {
                            return "ai-erik.html";
                  }

                  return "helpdesk.html";
          }

          const frame = document.getElementById("displayFrame");
          frame.src = getCurrentModeURL();

          setInterval(() => {
                  const newURL = getCurrentModeURL();
                  if (frame.src !== new URL(newURL, window.location.href).href) {
                            frame.src = newURL;
                  }
          }, 60000);
    </script>
  </body>
</html>html>
    </script></span>
  </body>
