<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erik Automation</title>
  <style>
    html, body { margin: 0; height: 100%; background: black; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
    #fsOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000000; display: flex; justify-content: center;
      align-items: center; z-index: 9999; cursor: pointer;
    }
    #fsOverlay span {
      color: #00ff88; font-family: monospace; font-size: 4rem;
      text-align: center; text-shadow: 0 0 30px #00ff88;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    #lunchOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: black; display: none; z-index: 9998; overflow: hidden;
    }
    .lunch-scroll {
      position: absolute; white-space: nowrap; font-family: monospace;
      font-size: 5rem; font-weight: bold; color: #00ff88;
      text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff8866;
      animation: scrollLeft 8s linear infinite;
    }
    @keyframes scrollLeft { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    #memeOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: black; display: none; justify-content: center;
      align-items: center; z-index: 9997;
    }
    #memeOverlay iframe { width: 100%; height: 100%; }
    #tinderOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: black; display: none; z-index: 9996;
    }
    #tinderOverlay iframe { width: 100%; height: 100%; border: none; }
    #nyheterOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: black; display: none; z-index: 9995;
    }
    #nyheterOverlay iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <div id="fsOverlay" onclick="goFS()"><span>TRYCK FOR FULLSCREEN</span></div>
  <div id="lunchOverlay"></div>
  <div id="memeOverlay"></div>
  <div id="tinderOverlay"></div>
  <div id="nyheterOverlay"></div>
  <iframe id="mainFrame" src=""></iframe>
  <script>
    function goFS() {
      var el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
      document.getElementById("fsOverlay").style.display = "none";
    }
    setInterval(function() {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        document.getElementById("fsOverlay").style.display = "flex";
      }
    }, 10000);
    function loadPage() {
      var now = new Date();
      var day = now.getDay();
      var time = now.getHours() * 60 + now.getMinutes();
      var page = "ai-erik.html";
      if (day === 1) page = "ai-erik.html";
      else if (day === 2) page = "dricks.html";
      else if (day === 3) page = "godis.html";
      else if (day === 4) page = time < 720 ? "ai-erik.html" : "helpdesk.html";
      else if (day === 5) page = time < 720 ? "dricks.html" : "ai-erik.html";
      document.getElementById("mainFrame").src = page;
    }
    loadPage();
    setInterval(loadPage, 300000);
    function checkLunch() {
      var now = new Date();
      var day = now.getDay();
      var time = now.getHours() * 60 + now.getMinutes();
      var lo = document.getElementById("lunchOverlay");
      if (day >= 1 && day <= 3 && time >= 705 && time < 735) {
        if (lo.style.display !== "block") {
          lo.style.display = "block";
          lo.innerHTML = "";
          for (var i = 0; i < 8; i++) {
            var d = document.createElement("div");
            d.className = "lunch-scroll";
            d.textContent = "LUNCH LUNCH LUNCH LUNCH LUNCH";
            d.style.top = (i * 13) + "%";
            d.style.animationDelay = (i * 0.7) + "s";
            lo.appendChild(d);
          }
        }
      } else { lo.style.display = "none"; }
    }
    setInterval(checkLunch, 30000);
    checkLunch();
    var memes = ["dQw4w9WgXcQ","djV11Xbc914","lDhAdMKrl9I","EE-xtCF3T94","y6120QOlsfU","2Z4m4lnjxkY"];
    function showMeme() {
      var mo = document.getElementById("memeOverlay");
      var id = memes[Math.floor(Math.random() * memes.length)];
      mo.innerHTML = '<iframe src="https://www.youtube.com/embed/' + id + '?autoplay=1&controls=0" allow="autoplay" allowfullscreen></iframe>';
      mo.style.display = "flex";
      setTimeout(function() { mo.style.display = "none"; mo.innerHTML = ""; }, 10000 + Math.random() * 5000);
    }
    function showTinder() {
      var to = document.getElementById("tinderOverlay");
      to.innerHTML = '<iframe src="tinder.html"></iframe>';
      to.style.display = "block";
      setTimeout(function() { to.style.display = "none"; to.innerHTML = ""; }, 55000);
    }
    function showNyheter() {
      var no = document.getElementById("nyheterOverlay");
      no.innerHTML = '<iframe src="nyheter.html"></iframe>';
      no.style.display = "block";
      setTimeout(function() { no.style.display = "none"; no.innerHTML = ""; }, 45000);
    }
    setInterval(function() {
      var r = Math.random();
      if (r < 0.03) { showTinder(); }
      else if (r < 0.06) { showNyheter(); }
      else if (r < 0.13) { showMeme(); }
    }, 120000);
  </script>
</body>
</html>
