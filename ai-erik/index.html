    function addMessage(text) {
      const msg = document.createElement("div");
      msg.className = "message";
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;

      let i = 0;
      function type() {
        if (i <= text.length) {
          msg.textContent = "E: " + text.slice(0, i);
          i++;
          setTimeout(type, 15);
        } else {
          const timestamp = new Date().toTimeString().split(" ")[0];
          log.textContent += `[${timestamp}] E: ${text}\n`;
          log.scrollTop = log.scrollHeight;
        }
      }
      type();
    }

    function loop() {
      const text = messages[Math.floor(Math.random() * messages.length)];
      const r = Math.random();

      if (r < 0.03) {
        addMessage("🔐 ADMINLÄGE AKTIVERAT – Åtkomst till förbjudna menyer...");
        setTimeout(() => {
          addMessage("⚠️ Erik justerar säkerhetsprotokoll. Det här loggas inte.");
          setTimeout(() => {
            addMessage("🟢 ADMINLÄGE STÄNGT – Normal drift återupptas.");
            setTimeout(loop, 2000);
          }, 2500);
        }, 2000);
        return;
      }

      if (r >= 0.03 && r < 0.08) {
        addMessage("🛑 SYSTEMFEL – Erik startar om...");
        setTimeout(() => {
          addMessage("✅ System återställt. Återupptar arbete...");
          setTimeout(loop, 2000);
        }, 3000);
        return;
      }

      addMessage(text);
      const next = Math.random() * 3000 + 2000;
      setTimeout(loop, next);
    }

    addMessage("Authenticating Erik...");
    setTimeout(() => {
      addMessage("Access granted. Terminal öppen.");
      setTimeout(loop, 2000);
