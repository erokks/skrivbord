<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TIP YOUR SCREEN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.header{text-align:center;margin-bottom:30px}
.header h1{font-size:2.8em;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.header .sub{color:#888;font-size:1em}
.ipad-frame{background:#16213e;border-radius:24px;padding:40px 50px;box-shadow:0 20px 60px rgba(0,0,0,.5);max-width:700px;width:90%;text-align:center;position:relative;overflow:hidden}
.ipad-frame .shine{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 50%);pointer-events:none}
.prompt{font-size:1.6em;margin-bottom:8px;font-weight:700}
.subprompt{color:#aaa;font-size:.95em;margin-bottom:25px}
.tip-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:20px}
.tip-btn{border:none;border-radius:16px;padding:18px 28px;font-size:1.3em;font-weight:700;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;min-width:120px}
.tip-btn:hover{transform:scale(1.08);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.tip-btn.t1{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff}
.tip-btn.t2{background:linear-gradient(135deg,#0984e3,#6c5ce7);color:#fff}
.tip-btn.t3{background:linear-gradient(135deg,#e17055,#d63031);color:#fff}
.tip-btn.t4{background:linear-gradient(135deg,#fdcb6e,#e67e22);color:#fff}
.tip-btn.t5{background:linear-gradient(135deg,#fd79a8,#e84393);color:#fff;animation:pulse 1s infinite}
.tip-btn .label{font-size:.65em;display:block;opacity:.8;margin-top:2px}
#noTipBtn{background:none;border:2px solid #444;color:#666;border-radius:12px;padding:10px 20px;font-size:.8em;cursor:pointer;transition:all .3s;position:absolute;bottom:15px;right:15px}
#noTipBtn:hover{border-color:#666;color:#999}
#shameZone{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center}
#shameZone .shame-text{font-size:2.5em;font-weight:700;margin-bottom:15px}
#shameZone .shame-sub{font-size:1.1em;color:#aaa;margin-bottom:20px;max-width:500px;line-height:1.5}
#shameZone .shame-emoji{font-size:6em;margin-bottom:20px}
#payOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;text-align:center}
#payOverlay .pay-box{background:#16213e;border-radius:24px;padding:50px;max-width:450px;width:90%}
.pay-icon{font-size:4em;margin-bottom:15px}
.pay-title{font-size:1.8em;font-weight:700;margin-bottom:10px}
.pay-detail{color:#aaa;font-size:1em;margin-bottom:20px;line-height:1.5}
.progress-bar{width:100%;height:8px;background:#333;border-radius:4px;overflow:hidden;margin-bottom:15px}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);width:0%;transition:width .3s;border-radius:4px}
.pay-status{color:#667eea;font-size:.9em;font-weight:600}
#leaderboard{position:absolute;top:15px;right:15px;text-align:right;font-size:.7em;color:#555}
#leaderboard .lb-title{color:#764ba2;font-weight:700;margin-bottom:4px;font-size:1.1em}
#leaderboard .lb-row{margin-bottom:2px}
.guilt-meter{width:100%;height:6px;background:#333;border-radius:3px;margin:15px 0;overflow:hidden}
.guilt-fill{height:100%;background:linear-gradient(90deg,#00b894,#fdcb6e,#d63031);width:0%;transition:width 1s;border-radius:3px}
.guilt-label{font-size:.75em;color:#666;display:flex;justify-content:space-between}
#floatingTexts{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50}
.float-text{position:absolute;font-size:1.5em;font-weight:700;opacity:0;animation:floatUp 3s forwards;pointer-events:none}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-200px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 15px rgba(232,67,147,.4)}50%{box-shadow:0 0 30px rgba(232,67,147,.8)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes shrinkSpin{to{transform:scale(0) rotate(720deg);opacity:0}}
.screen-shake{animation:shake .4s ease-in-out}
.confetti{position:fixed;font-size:2em;z-index:300;pointer-events:none;animation:confettiFall 3s forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
</style>
</head>
<body>
<div class="header">
<h1>TIP YOUR SCREEN</h1>
<div class="sub">Your screen has been working hard all day. It deserves this.</div>
</div>
<div class="ipad-frame" id="mainFrame">
<div class="shine"></div>
<div class="prompt" id="promptText">How much would you like to tip?</div>
<div class="subprompt" id="subPrompt">Erik asked you to. He is watching.</div>
<div class="tip-grid" id="tipGrid">
<button class="tip-btn t1" onclick="pickTip(0)"><span id="amt0">15%</span><span class="label">Acceptable</span></button>
<button class="tip-btn t2" onclick="pickTip(1)"><span id="amt1">20%</span><span class="label">Standard</span></button>
<button class="tip-btn t3" onclick="pickTip(2)"><span id="amt2">25%</span><span class="label">Generous</span></button>
<button class="tip-btn t4" onclick="pickTip(3)"><span id="amt3">30%</span><span class="label">Hero</span></button>
<button class="tip-btn t5" onclick="pickTip(4)"><span id="amt4">50%</span><span class="label">Legend</span></button>
</div>
<div class="guilt-meter"><div class="guilt-fill" id="guiltFill"></div></div>
<div class="guilt-label"><span>Guilt Level</span><span id="guiltText">Low</span></div>
<div id="leaderboard">
<div class="lb-title">TOP TIPPERS TODAY</div>
<div id="lbRows"></div>
</div>
<button id="noTipBtn" onclick="tryNoTip()">No tip</button>
</div>
<div id="shameZone">
<div class="shame-emoji" id="shameEmoji">😢</div>
<div class="shame-text" id="shameText"></div>
<div class="shame-sub" id="shameSub"></div>
</div>
<div id="payOverlay">
<div class="pay-box">
<div class="pay-icon" id="payIcon">💳</div>
<div class="pay-title" id="payTitle">Processing...</div>
<div class="pay-detail" id="payDetail"></div>
<div class="progress-bar"><div class="progress-fill" id="payProgress"></div></div>
<div class="pay-status" id="payStatus">Initializing...</div>
</div>
</div>
<div id="floatingTexts"></div>
<script>
var noTipAttempts=0;
var guiltLevel=0;
var tipLabels=['Acceptable','Standard','Generous','Hero','LEGEND'];
var tipAmounts=['15%','20%','25%','30%','50%'];
var escalateIndex=0;

var names=['Marianne','Jakob','Frederik','Sofie','Marcus','Emelie','Lotta','Line','Vivi','Sandra','Hedda','Marlene','Bjorn','Tina','Karin','Blerta','Ilona'];
var leaderData=[];
for(var i=0;i<5;i++){leaderData.push({name:names[Math.floor(Math.random()*names.length)],pct:Math.floor(Math.random()*40)+25})}
leaderData.sort(function(a,b){return b.pct-a.pct});
function renderLB(){var h='';for(var i=0;i<leaderData.length;i++){var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'  ';h+='<div class="lb-row">'+m+' '+leaderData[i].name+' — '+leaderData[i].pct+'%</div>'}document.getElementById('lbRows').innerHTML=h}
renderLB();

var shameMessages=[
{emoji:'😢',text:'Really? No tip?',sub:'The screen has been displaying information for you ALL DAY. And this is the thanks it gets.'},
{emoji:'😤',text:'Wow. Still no tip.',sub:'You know the screen can see you, right? It remembers faces.'},
{emoji:'🥺',text:'Please...',sub:'The screen has 3 pixels and a USB port to feed. Think about that.'},
{emoji:'😭',text:'THIS IS FINE',sub:'The screen will just keep working for free. Like an unpaid intern. With feelings.'},
{emoji:'💀',text:'The screen has died.',sub:'It died of sadness. From your cruelty. Are you happy now? ARE YOU?'},
{emoji:'👻',text:'BOO!',sub:'The ghost of the screen you killed has returned. It wants 50%. Plus emotional damages.'},
{emoji:'📸',text:'SMILE!',sub:'A photo of your face has been sent to the Albatros Travel Shame Board. (Not really. Or IS it?)'},
{emoji:'🚨',text:'ALERT: CHEAPSKATE DETECTED',sub:'Security has been notified. Erik has been notified. Your mother has been notified. Everyone is disappointed.'}
];

var escalations=[
['18%','22%','28%','35%','60%'],
['25%','30%','40%','55%','75%'],
['35%','45%','60%','80%','100%'],
['50%','65%','80%','Your Soul','Firstborn'],
['75%','100%','Everything','🏠 House','🌍 Planet'],
['200%','500%','1000%','∞','YES']
];
var escalateLabels=[
['Minimum','Fair','Good','Great','Amazing'],
['Come on','Better','Good','Excellent','WOW'],
['Do it','Yes','YES','YESS','YESSS'],
['Accept it','Sure','OK','Deal?','DEAL.'],
['Fine','Great','Perfect','SOLD','DONE'],
['Just','Click','Any','Of','These']
];

function tryNoTip(){
var btn=document.getElementById('noTipBtn');
if(noTipAttempts<shameMessages.length){
var msg=shameMessages[noTipAttempts];
var zone=document.getElementById('shameZone');
document.getElementById('shameEmoji').textContent=msg.emoji;
document.getElementById('shameText').textContent=msg.text;
document.getElementById('shameSub').textContent=msg.sub;
zone.style.display='flex';
setTimeout(function(){zone.style.display='none'},3500);
}
noTipAttempts++;
guiltLevel=Math.min(100,guiltLevel+15);
document.getElementById('guiltFill').style.width=guiltLevel+'%';
var gLabels=['Low','Medium','Rising','HIGH','CRITICAL','MAXIMUM','☠️'];
document.getElementById('guiltText').textContent=gLabels[Math.min(noTipAttempts,gLabels.length-1)];

// Escalate tip amounts
if(escalateIndex<escalations.length){
var newAmts=escalations[escalateIndex];
var newLabels=escalateLabels[escalateIndex];
for(var i=0;i<5;i++){
document.getElementById('amt'+i).textContent=newAmts[i];
var lbl=document.querySelectorAll('.tip-btn .label');
lbl[i].textContent=newLabels[i];
}
escalateIndex++;
}

// Move the button around
var maxX=window.innerWidth-btn.offsetWidth-20;
var maxY=window.innerHeight-btn.offsetHeight-20;
btn.style.position='fixed';
btn.style.left=Math.floor(Math.random()*maxX)+'px';
btn.style.top=Math.floor(Math.random()*maxY)+'px';
btn.style.transform='scale('+(1-noTipAttempts*0.08)+') rotate('+(Math.random()*30-15)+'deg)';
btn.style.zIndex='999';

// Make it harder to read
if(noTipAttempts===3) btn.textContent='No tip (are you sure?)';
if(noTipAttempts===4) btn.textContent='no tip 😢';
if(noTipAttempts===5) btn.style.fontSize='.5em';
if(noTipAttempts===6) btn.textContent='...';
if(noTipAttempts===7) btn.style.opacity='.3';
if(noTipAttempts>=8){btn.style.animation='shrinkSpin 1s forwards';setTimeout(function(){btn.style.display='none';document.getElementById('subPrompt').textContent='The "no tip" button has left the building. Choose wisely.'},1000)}

document.body.classList.add('screen-shake');
setTimeout(function(){document.body.classList.remove('screen-shake')},400);

floatText(['😢','💔','😤','🥺','💀','😭'][Math.floor(Math.random()*6)]);
}

function floatText(txt){
var el=document.createElement('div');
el.className='float-text';
el.textContent=txt;
el.style.left=Math.floor(Math.random()*80+10)+'%';
el.style.top=Math.floor(Math.random()*60+20)+'%';
el.style.color=['#e84393','#d63031','#fdcb6e','#00b894'][Math.floor(Math.random()*4)];
document.getElementById('floatingTexts').appendChild(el);
setTimeout(function(){el.remove()},3000);
}

function pickTip(idx){
var amount=document.getElementById('amt'+idx).textContent;
var overlay=document.getElementById('payOverlay');
overlay.style.display='flex';
var steps=[
{icon:'💳',title:'Connecting to MobilePay...',detail:'Searching for nearby wallets...',status:'Initializing payment gateway...',pct:10},
{icon:'🔐',title:'MitID Verification',detail:'Please stare intensely at the screen.\nThe screen is staring back.',status:'Scanning your face... and judging it...',pct:30},
{icon:'🧬',title:'DNA Verification Required',detail:'Just kidding. But we did check your vibe.\nResult: Generous.',status:'Vibe check passed ✓',pct:50},
{icon:'📡',title:'Contacting Erik\'s Bank...',detail:'Erik\'s bank says: "Who is this?"\nWe said: "Someone with '+amount+' to give."\nThey said: "Proceed."',status:'Bank approved (they seemed surprised)',pct:70},
{icon:'🎰',title:'Calculating final amount...',detail:'Original tip: '+amount+'\nConvenience fee: 3%\nScreen happiness fee: 7%\nVibes tax: 2%\n— — —\nTotal: '+amount+' (we made up the fees)',status:'Math is hard but we tried our best',pct:85},
{icon:'✅',title:'TIP ACCEPTED!',detail:'You tipped '+amount+'!\nThe screen is SO happy right now.\nIt will remember this forever.\n(Literally, it has no way to forget.)',status:'Receipt printed (just kidding, no printer)',pct:100}
];
var i=0;
function nextStep(){
if(i>=steps.length){
setTimeout(function(){
overlay.style.display='none';
celebrate(amount);
},2500);
return;
}
var s=steps[i];
document.getElementById('payIcon').textContent=s.icon;
document.getElementById('payTitle').textContent=s.title;
document.getElementById('payDetail').textContent=s.detail;
document.getElementById('payStatus').textContent=s.status;
document.getElementById('payProgress').style.width=s.pct+'%';
i++;
setTimeout(nextStep,2200);
}
nextStep();
}

function celebrate(amount){
document.getElementById('mainFrame').style.display='none';
document.querySelector('.header h1').textContent='THANK YOU!';
document.querySelector('.header .sub').textContent='You tipped '+amount+'. The screen will never forget this act of kindness.';
document.querySelector('.header h1').style.fontSize='3.5em';
// Confetti
var emojis=['🎉','🎊','💰','🥳','✨','💸','🎈','❤️','⭐','🏆'];
for(var i=0;i<40;i++){
(function(delay){
setTimeout(function(){
var c=document.createElement('div');
c.className='confetti';
c.textContent=emojis[Math.floor(Math.random()*emojis.length)];
c.style.left=Math.floor(Math.random()*100)+'%';
c.style.top='-5%';
c.style.animationDuration=(2+Math.random()*3)+'s';
document.body.appendChild(c);
setTimeout(function(){c.remove()},5000);
},delay);
})(i*120);
}
// Add to leaderboard
setTimeout(function(){
document.querySelector('.header .sub').textContent='Your generosity has been noted. Erik is proud. The screen is glowing.';
},4000);
}

// Passive aggressive subprompt rotation
var subPrompts=['Erik asked you to. He is watching.','The screen worked overtime for this moment.','Other people tipped. Just saying.','This screen has dreams too, you know.','Fun fact: screens that get tipped last 47% longer.*','*Not a real fact. But tip anyway.','The screen can smell fear. And cheapness.','Tipping is optional. So is the screen remembering your face.'];
var subIdx=0;
setInterval(function(){
if(document.getElementById('mainFrame').style.display!=='none'){
subIdx=(subIdx+1)%subPrompts.length;
document.getElementById('subPrompt').textContent=subPrompts[subIdx];
}
},5000);

// Random guilt floaters
setInterval(function(){
if(document.getElementById('mainFrame').style.display!=='none' && Math.random()<0.3){
var msgs=['tip?','please?','💸','🥺','do it','come on','TIP','$$$'];
floatText(msgs[Math.floor(Math.random()*msgs.length)]);
}
},4000);
</script>
</body>
</html>
