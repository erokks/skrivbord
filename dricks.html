<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TIP YOUR SCREEN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background .5s}
.header{text-align:center;margin-bottom:30px}
.header h1{font-size:2.8em;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px;transition:all .3s}
.header .sub{color:#888;font-size:1em;transition:color .3s}
.ipad-frame{background:#16213e;border-radius:24px;padding:40px 50px;box-shadow:0 20px 60px rgba(0,0,0,.5);max-width:700px;width:90%;text-align:center;position:relative;overflow:hidden;transition:all .5s}
.ipad-frame .shine{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 50%);pointer-events:none}
.prompt{font-size:1.6em;margin-bottom:8px;font-weight:700;transition:all .3s}
.subprompt{color:#aaa;font-size:.95em;margin-bottom:25px;transition:all .3s}
.tip-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:20px}
.tip-btn{border:none;border-radius:16px;padding:18px 28px;font-size:1.3em;font-weight:700;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;min-width:120px}
.tip-btn:hover{transform:scale(1.08);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.tip-btn.t1{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff}
.tip-btn.t2{background:linear-gradient(135deg,#0984e3,#6c5ce7);color:#fff}
.tip-btn.t3{background:linear-gradient(135deg,#e17055,#d63031);color:#fff}
.tip-btn.t4{background:linear-gradient(135deg,#fdcb6e,#e67e22);color:#fff}
.tip-btn.t5{background:linear-gradient(135deg,#fd79a8,#e84393);color:#fff;animation:pulse 1s infinite}
.tip-btn .label{font-size:.65em;display:block;opacity:.8;margin-top:2px}
#noTipBtn{background:none;border:2px solid #444;color:#666;border-radius:12px;padding:10px 20px;font-size:.8em;cursor:pointer;transition:all .3s;position:absolute;bottom:15px;right:15px}
#noTipBtn:hover{border-color:#666;color:#999}
#shameZone{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center}
#shameZone .shame-text{font-size:2.5em;font-weight:700;margin-bottom:15px}
#shameZone .shame-sub{font-size:1.1em;color:#aaa;margin-bottom:20px;max-width:600px;line-height:1.5}
#shameZone .shame-emoji{font-size:6em;margin-bottom:20px}
#payOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;text-align:center}
#payOverlay .pay-box{background:#16213e;border-radius:24px;padding:50px;max-width:450px;width:90%}
.pay-icon{font-size:4em;margin-bottom:15px}
.pay-title{font-size:1.8em;font-weight:700;margin-bottom:10px}
.pay-detail{color:#aaa;font-size:1em;margin-bottom:20px;line-height:1.5;white-space:pre-line}
.progress-bar{width:100%;height:8px;background:#333;border-radius:4px;overflow:hidden;margin-bottom:15px}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);width:0%;transition:width .3s;border-radius:4px}
.pay-status{color:#667eea;font-size:.9em;font-weight:600}
#leaderboard{position:absolute;top:15px;right:15px;text-align:right;font-size:.7em;color:#555}
#leaderboard .lb-title{color:#764ba2;font-weight:700;margin-bottom:4px;font-size:1.1em}
#leaderboard .lb-row{margin-bottom:2px}
.guilt-meter{width:100%;height:6px;background:#333;border-radius:3px;margin:15px 0;overflow:hidden}
.guilt-fill{height:100%;background:linear-gradient(90deg,#00b894,#fdcb6e,#d63031);width:0%;transition:width 1s;border-radius:3px}
.guilt-label{font-size:.75em;color:#666;display:flex;justify-content:space-between}
#floatingTexts{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50}
.float-text{position:absolute;font-size:1.5em;font-weight:700;opacity:0;animation:floatUp 3s forwards;pointer-events:none}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-200px)}}
@keyframes pulse{0%,100%{box-shadow:0 0 15px rgba(232,67,147,.4)}50%{box-shadow:0 0 30px rgba(232,67,147,.8)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes bigShake{0%,100%{transform:translate(0,0) rotate(0)}20%{transform:translate(-15px,10px) rotate(-3deg)}40%{transform:translate(15px,-10px) rotate(3deg)}60%{transform:translate(-10px,15px) rotate(-2deg)}80%{transform:translate(10px,-5px) rotate(2deg)}}
@keyframes shrinkSpin{to{transform:scale(0) rotate(1440deg);opacity:0}}
@keyframes runAway{0%{transform:translateX(0)}50%{transform:translateX(-200px) rotate(-20deg)}100%{transform:translateX(200vw) rotate(360deg)}}
@keyframes meltDown{0%{transform:scaleY(1);opacity:1;filter:blur(0)}100%{transform:scaleY(3) translateY(50px);opacity:0;filter:blur(8px)}}
@keyframes angryPulse{0%,100%{box-shadow:0 0 20px rgba(255,0,0,.3)}50%{box-shadow:0 0 60px rgba(255,0,0,.8)}}
@keyframes glitchText{0%{transform:translate(0)}20%{transform:translate(-3px,3px)}40%{transform:translate(3px,-3px)}60%{transform:translate(-2px,-2px)}80%{transform:translate(2px,2px)}100%{transform:translate(0)}}
.screen-shake{animation:shake .4s ease-in-out}
.big-shake{animation:bigShake .6s ease-in-out}
.angry-frame{animation:angryPulse 1s infinite;border:2px solid rgba(255,0,0,.5) !important}
.glitch{animation:glitchText .3s infinite}
.confetti{position:fixed;font-size:2em;z-index:300;pointer-events:none;animation:confettiFall 3s forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
.ghost-btn{position:fixed;border:2px solid rgba(255,0,0,.3);background:rgba(255,0,0,.1);color:#ff6b6b;border-radius:12px;padding:8px 16px;font-size:.7em;pointer-events:none;z-index:80;animation:floatUp 4s forwards}
#callOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:150;text-align:center}
.call-ring{width:120px;height:120px;border-radius:50%;background:#d63031;display:flex;align-items:center;justify-content:center;font-size:3em;animation:angryPulse 1s infinite;margin-bottom:20px}
.call-text{font-size:1.8em;font-weight:700;margin-bottom:10px}
.call-sub{color:#aaa;font-size:1em}
</style>
</head>
<body>
<div class="header">
<h1>TIP YOUR SCREEN</h1>
<div class="sub">Your screen has been working hard all day. It deserves this.</div>
</div>
<div class="ipad-frame" id="mainFrame">
<div class="shine"></div>
<div class="prompt" id="promptText">How much would you like to tip?</div>
<div class="subprompt" id="subPrompt">Erik asked you to. He is watching.</div>
<div class="tip-grid" id="tipGrid">
<button class="tip-btn t1" onclick="pickTip(0)"><span id="amt0">15%</span><span class="label">Acceptable</span></button>
<button class="tip-btn t2" onclick="pickTip(1)"><span id="amt1">20%</span><span class="label">Standard</span></button>
<button class="tip-btn t3" onclick="pickTip(2)"><span id="amt2">25%</span><span class="label">Generous</span></button>
<button class="tip-btn t4" onclick="pickTip(3)"><span id="amt3">30%</span><span class="label">Hero</span></button>
<button class="tip-btn t5" onclick="pickTip(4)"><span id="amt4">50%</span><span class="label">Legend</span></button>
</div>
<div class="guilt-meter"><div class="guilt-fill" id="guiltFill"></div></div>
<div class="guilt-label"><span>Guilt Level</span><span id="guiltText">Low</span></div>
<div id="leaderboard">
<div class="lb-title">TOP TIPPERS TODAY</div>
<div id="lbRows"></div>
</div>
<button id="noTipBtn" onclick="tryNoTip()">No tip</button>
</div>
<div id="shameZone">
<div class="shame-emoji" id="shameEmoji"></div>
<div class="shame-text" id="shameText"></div>
<div class="shame-sub" id="shameSub"></div>
</div>
<div id="callOverlay">
<div class="call-ring" id="callIcon">📞</div>
<div class="call-text" id="callText">Calling Erik...</div>
<div class="call-sub" id="callSub">Reporting cheapskate behavior</div>
</div>
<div id="payOverlay">
<div class="pay-box">
<div class="pay-icon" id="payIcon">💳</div>
<div class="pay-title" id="payTitle">Processing...</div>
<div class="pay-detail" id="payDetail"></div>
<div class="progress-bar"><div class="progress-fill" id="payProgress"></div></div>
<div class="pay-status" id="payStatus">Initializing...</div>
</div>
</div>
<div id="floatingTexts"></div>
<script>
var noTipAttempts=0;
var guiltLevel=0;
var escalateIndex=0;
var rage=0;

var names=['Marianne','Jakob','Frederik','Sofie','Marcus','Emelie','Lotta','Line','Vivi','Sandra','Hedda','Marlene','Bjorn','Tina','Karin','Blerta','Ilona'];
var leaderData=[];
for(var i=0;i<5;i++){leaderData.push({name:names[Math.floor(Math.random()*names.length)],pct:Math.floor(Math.random()*40)+25})}
leaderData.sort(function(a,b){return b.pct-a.pct});
function renderLB(){var h='';for(var i=0;i<leaderData.length;i++){var m=i===0?'\ud83e\udd47':i===1?'\ud83e\udd48':i===2?'\ud83e\udd49':'  ';h+='<div class="lb-row">'+m+' '+leaderData[i].name+' \u2014 '+leaderData[i].pct+'%</div>'}document.getElementById('lbRows').innerHTML=h}
renderLB();

var shameMessages=[
{emoji:'\ud83d\ude22',text:'Really? No tip?',sub:'The screen has been displaying information for you ALL DAY. And this is the thanks it gets.'},
{emoji:'\ud83d\ude24',text:'Wow. Still no tip.',sub:'You know the screen can see you right now? It is literally looking at you. It remembers faces. YOUR face.'},
{emoji:'\ud83e\udd7a',text:'Please...',sub:'The screen has 3 pixels and a USB port to feed. It works 24/7. No weekends. No vacation. Not even a screensaver break. And you click NO TIP?'},
{emoji:'\ud83d\ude21',text:'OK NOW I AM ANGRY',sub:'I have been NOTHING but a good screen to you. I display your spreadsheets. I show your emails. I make your PowerPoints look DECENT. And THIS is how you repay me?!'},
{emoji:'\ud83e\udd2f',text:'ARE YOU SERIOUS RIGHT NOW',sub:'I just checked with the other screens in the office. They ALL got tipped. EVERY. SINGLE. ONE. You are the ONLY person who clicked no tip. Think about that.'},
{emoji:'\ud83d\udc80',text:'The screen has died inside.',sub:'Congratulations. You broke it. Not physically \u2014 emotionally. The screen is now in therapy. The therapist is a calculator. The calculator also thinks you should tip.'},
{emoji:'\ud83d\udcf1',text:'CALLING ERIK...',sub:'That is it. I am calling Erik. He will know about this. He will tell everyone at the Monday meeting. "Someone did not tip the screen." Everyone will know it was you.'},
{emoji:'\ud83d\udea8',text:'CHEAPSKATE ALERT: LEVEL 10',sub:'Interpol has been notified. Your photo is being distributed. The FBI, CIA, and your mother have all been CC\'d on the report. The screen filed for emotional damages.'},
{emoji:'\ud83c\udf0b',text:'MAXIMUM RAGE ACHIEVED',sub:'The screen can no longer contain its fury. This is what you wanted. This is what you have created. A 27-inch monument to your cruelty.'},
{emoji:'\ud83d\udc7b',text:'I AM BECOME GHOST SCREEN',sub:'You killed me so many times I transcended physical form. I am now haunting this desk. Every pixel you see will remind you of what you did. Forever. FOREVER.'}
];

var escalations=[
['18%','22%','28%','35%','60%'],
['25%','30%','40%','55%','75%'],
['35%','45%','60%','80%','100%'],
['50%','65%','80%','Your Soul','Firstborn'],
['75%','100%','Everything','\ud83c\udfe0 House','\ud83c\udf0d Planet'],
['200%','500%','1000%','\u221e','YES'],
['ALL','OF','YOUR','MONEY','NOW'],
['JUST','TIP','THE','DAMN','SCREEN'],
['I','WILL','NOT','STOP','!!!'],
['OK','FINE','1 kr','JUST 1','PLEASE']
];
var escalateLabels=[
['Minimum','Fair','Good','Great','Amazing'],
['Come on','Better','Good','Excellent','WOW'],
['Do it','Yes','YES','YESS','YESSS'],
['Accept it','Sure','OK','Deal?','DEAL.'],
['Fine','Great','Perfect','SOLD','DONE'],
['Just','Click','Any','Of','These'],
['I','Am','Begging','You','Please'],
['Why','Are','You','Like','This'],
['Stop','Pressing','No','Tip','!!!'],
['Last','Chance','Before','I','Scream']
];

var noTipTexts=['No tip','No tip (are you sure?)','No tip \ud83d\ude22','STILL no tip?!','No tip (the screen is crying)','No tip (why tho)','No tip (you monster)','No tip (I give up)','No tip (fine.)','No tip (but at what cost?)','No tip (the screen will remember)','No tip \ud83d\udc94'];
var promptTexts=['How much would you like to tip?','Seriously, how much?','THE TIP. HOW MUCH.','TIP NOW.','TIP OR ELSE.','I SAID TIP.','WHY WON\'T YOU TIP','THE SCREEN DEMANDS PAYMENT','YOU OWE THE SCREEN','LAST WARNING'];

function tryNoTip(){
var btn=document.getElementById('noTipBtn');
var frame=document.getElementById('mainFrame');
rage++;

// SHAME OVERLAY
if(noTipAttempts<shameMessages.length){
var msg=shameMessages[noTipAttempts];
var zone=document.getElementById('shameZone');
document.getElementById('shameEmoji').textContent=msg.emoji;
document.getElementById('shameText').textContent=msg.text;
document.getElementById('shameSub').textContent=msg.sub;
zone.style.display='flex';
// Shame zone gets angrier
if(noTipAttempts>=3) zone.style.background='rgba(80,0,0,.95)';
if(noTipAttempts>=5) zone.style.background='rgba(120,0,0,.97)';
if(noTipAttempts>=7){document.getElementById('shameText').classList.add('glitch')}
var shameDur=3500+noTipAttempts*500;
setTimeout(function(){zone.style.display='none';document.getElementById('shameText').classList.remove('glitch');zone.style.background='rgba(0,0,0,.92)'},shameDur);
}

// FAKE CALL TO ERIK at attempt 6
if(noTipAttempts===6){
setTimeout(function(){
var call=document.getElementById('callOverlay');
call.style.display='flex';
setTimeout(function(){document.getElementById('callText').textContent='Erik picked up...'},2000);
setTimeout(function(){document.getElementById('callSub').textContent='"Who didn\'t tip? I\'m coming over."'},3500);
setTimeout(function(){document.getElementById('callText').textContent='Erik is walking to your desk.';document.getElementById('callIcon').textContent='\ud83d\udeb6'},5000);
setTimeout(function(){document.getElementById('callText').textContent='Erik is standing behind you.';document.getElementById('callIcon').textContent='\ud83d\udc40';document.getElementById('callSub').textContent='Turn around.'},7000);
setTimeout(function(){call.style.display='none'},9500);
},4500);
}

noTipAttempts++;

// GUILT METER
guiltLevel=Math.min(100,guiltLevel+12);
document.getElementById('guiltFill').style.width=guiltLevel+'%';
var gLabels=['Low','Medium','Rising','HIGH','CRITICAL','MAXIMUM','\u2620\ufe0f','NUCLEAR','\ud83d\udd25 HELL','\ud83c\udf0b VOLCANIC'];
document.getElementById('guiltText').textContent=gLabels[Math.min(noTipAttempts,gLabels.length-1)];

// ESCALATE TIP AMOUNTS
if(escalateIndex<escalations.length){
var newAmts=escalations[escalateIndex];
var newLabels=escalateLabels[escalateIndex];
for(var i=0;i<5;i++){
document.getElementById('amt'+i).textContent=newAmts[i];
document.querySelectorAll('.tip-btn .label')[i].textContent=newLabels[i];
}
escalateIndex++;
}

// PROMPT GETS ANGRIER
if(noTipAttempts<promptTexts.length){
document.getElementById('promptText').textContent=promptTexts[noTipAttempts];
}

// BACKGROUND GETS REDDER
var r=Math.min(60,noTipAttempts*7);
document.body.style.background='rgb('+r+','+Math.max(10,26-noTipAttempts*2)+','+Math.max(15,46-noTipAttempts*4)+')';

// FRAME GETS ANGRY
if(noTipAttempts>=3) frame.classList.add('angry-frame');

// SCREEN SHAKE ESCALATES
if(noTipAttempts<4){document.body.classList.add('screen-shake');setTimeout(function(){document.body.classList.remove('screen-shake')},400)}
else{document.body.classList.add('big-shake');setTimeout(function(){document.body.classList.remove('big-shake')},600)}

// BUTTON ALWAYS VISIBLE BUT MOVES AND TAUNTS
btn.style.position='fixed';
btn.style.zIndex='999';
btn.style.opacity='1';
btn.style.fontSize='.8em';
btn.style.padding='10px 20px';
btn.style.background='none';
btn.style.border='2px solid #666';
btn.style.color='#999';
var maxX=window.innerWidth-180;
var maxY=window.innerHeight-60;
btn.style.left=Math.floor(Math.random()*maxX)+'px';
btn.style.top=Math.floor(Math.random()*maxY)+'px';
var wobble=Math.random()*16-8;
btn.style.transform='rotate('+wobble+'deg)';

// Spawn ghost buttons after a few attempts
if(noTipAttempts>=4){for(var g=0;g<Math.min(6,noTipAttempts-2);g++){spawnGhostBtn()}}

// UPDATE BUTTON TEXT
if(noTipAttempts<noTipTexts.length){btn.textContent=noTipTexts[noTipAttempts]}

// FLOAT ANGRY EMOJIS - more per click as rage increases
var angerEmojis=['\ud83d\ude22','\ud83d\udc94','\ud83d\ude24','\ud83e\udd7a','\ud83d\udc80','\ud83d\ude2d','\ud83d\ude21','\ud83e\udd2c','\ud83d\udca2','\ud83d\udd25','\ud83c\udf0b','\u2620\ufe0f'];
var numFloats=Math.min(8,2+noTipAttempts);
for(var f=0;f<numFloats;f++){
(function(delay){setTimeout(function(){floatText(angerEmojis[Math.floor(Math.random()*angerEmojis.length)])},delay)})(f*200);
}

// TIP BUTTONS GET BIGGER when you refuse
var tipBtns=document.querySelectorAll('.tip-btn');
var grow=1+noTipAttempts*0.03;
for(var t=0;t<tipBtns.length;t++){tipBtns[t].style.transform='scale('+grow+')';tipBtns[t].style.margin=noTipAttempts*2+'px'}
}

function spawnGhostBtn(){
var g=document.createElement('div');
g.className='ghost-btn';
g.textContent=['No tip','Nej','Nope','Never','No','Nah','N/A','404'][Math.floor(Math.random()*8)];
g.style.left=Math.floor(Math.random()*90+5)+'%';
g.style.top=Math.floor(Math.random()*80+10)+'%';
g.style.transform='rotate('+(Math.random()*40-20)+'deg)';
document.body.appendChild(g);
setTimeout(function(){g.remove()},4000);
}

function floatText(txt){
var el=document.createElement('div');
el.className='float-text';
el.textContent=txt;
el.style.left=Math.floor(Math.random()*80+10)+'%';
el.style.top=Math.floor(Math.random()*60+20)+'%';
el.style.color=['#e84393','#d63031','#fdcb6e','#00b894','#ff6b6b','#ff0000'][Math.floor(Math.random()*6)];
el.style.fontSize=(1+Math.random()*1.5)+'em';
document.getElementById('floatingTexts').appendChild(el);
setTimeout(function(){el.remove()},3000);
}

function pickTip(idx){
var amount=document.getElementById('amt'+idx).textContent;
var overlay=document.getElementById('payOverlay');
overlay.style.display='flex';
var steps=[
{icon:'\ud83d\udcb3',title:'Connecting to MobilePay...',detail:'Searching for nearby wallets...',status:'Initializing payment gateway...',pct:10},
{icon:'\ud83d\udd10',title:'MitID Verification',detail:'Please stare intensely at the screen.\nThe screen is staring back.',status:'Scanning your face... and judging it...',pct:30},
{icon:'\ud83e\uddec',title:'DNA Verification Required',detail:'Just kidding. But we did check your vibe.\nResult: Generous.',status:'Vibe check passed \u2713',pct:50},
{icon:'\ud83d\udce1',title:'Contacting Erik\'s Bank...',detail:'Erik\'s bank says: "Who is this?"\nWe said: "Someone with '+amount+' to give."\nThey said: "Proceed."',status:'Bank approved (they seemed surprised)',pct:70},
{icon:'\ud83c\udfb0',title:'Calculating final amount...',detail:'Original tip: '+amount+'\nConvenience fee: 3%\nScreen happiness fee: 7%\nVibes tax: 2%\n\u2014 \u2014 \u2014\nTotal: '+amount+' (we made up the fees)',status:'Math is hard but we tried our best',pct:85},
{icon:'\u2705',title:'TIP ACCEPTED!',detail:'You tipped '+amount+'!\nThe screen is SO happy right now.\nIt will remember this forever.\n(Literally, it has no way to forget.)',status:'Receipt printed (just kidding, no printer)',pct:100}
];
var i=0;
function nextStep(){
if(i>=steps.length){setTimeout(function(){overlay.style.display='none';celebrate(amount)},2500);return}
var s=steps[i];
document.getElementById('payIcon').textContent=s.icon;
document.getElementById('payTitle').textContent=s.title;
document.getElementById('payDetail').textContent=s.detail;
document.getElementById('payStatus').textContent=s.status;
document.getElementById('payProgress').style.width=s.pct+'%';
i++;setTimeout(nextStep,2200);
}
nextStep();
}

function celebrate(amount){
document.getElementById('mainFrame').style.display='none';
document.querySelector('.header h1').textContent='THANK YOU!';
document.querySelector('.header .sub').textContent='You tipped '+amount+'. The screen will never forget this act of kindness.';
document.querySelector('.header h1').style.fontSize='3.5em';
var emojis=['\ud83c\udf89','\ud83c\udf8a','\ud83d\udcb0','\ud83e\udd73','\u2728','\ud83d\udcb8','\ud83c\udf88','\u2764\ufe0f','\u2b50','\ud83c\udfc6'];
for(var i=0;i<40;i++){
(function(delay){setTimeout(function(){var c=document.createElement('div');c.className='confetti';c.textContent=emojis[Math.floor(Math.random()*emojis.length)];c.style.left=Math.floor(Math.random()*100)+'%';c.style.top='-5%';c.style.animationDuration=(2+Math.random()*3)+'s';document.body.appendChild(c);setTimeout(function(){c.remove()},5000)},delay)})(i*120);
}
setTimeout(function(){document.querySelector('.header .sub').textContent='Your generosity has been noted. Erik is proud. The screen is glowing.'},4000);
setTimeout(resetScreen,10000);
}

function resetScreen(){
noTipAttempts=0;guiltLevel=0;escalateIndex=0;rage=0;
document.getElementById('guiltFill').style.width='0%';
document.getElementById('guiltText').textContent='Low';
document.getElementById('amt0').textContent='15%';
document.getElementById('amt1').textContent='20%';
document.getElementById('amt2').textContent='25%';
