<!DOCTYPE html>
<html lang="sv">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Erik AI - Terminal</title>
    <style>
          @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
          body {
                  margin: 0;
                  font-family: 'Share Tech Mono', monospace;
                  background: #0a0a0a;
                  color: #00ff88;
                  height: 100vh;
                  overflow: hidden;
                  display: flex;
                  flex-direction: column;
          }
          header {
                  background: linear-gradient(90deg, #001a12, #002d1f, #001a12);
                  padding: 0.8rem 1.5rem;
                  font-size: 2.5rem;
                  font-weight: bold;
                  text-align: center;
                  text-shadow: 0 0 20px #00ff88;
                  border-bottom: 2px solid #00ff8844;
                  flex-shrink: 0;
          }
          #chat {
                  flex: 1;
                  overflow: hidden;
                  display: flex;
                  flex-direction: column;
                  justify-content: flex-end;
                  padding: 1rem 1.5rem;
                  gap: 0.6rem;
          }
          .message {
                  font-size: 2.2rem;
                  line-height: 1.3;
                  padding: 0.5rem 1rem;
                  border-left: 4px solid #00ff88;
                  text-shadow: 0 0 8px #00ff8866;
                  animation: fadeIn 0.3s ease-in;
                  white-space: pre-wrap;
          }
          .message.special {
                  color: #ff6600;
                  border-left-color: #ff6600;
                  text-shadow: 0 0 12px #ff660066;
          }
          .message.error {
                  color: #ff3333;
                  border-left-color: #ff3333;
                  text-shadow: 0 0 12px #ff333366;
          }
          .message.success {
                  color: #33ff33;
                  border-left-color: #33ff33;
                  text-shadow: 0 0 12px #33ff3366;
          }
          .cursor {
                  display: inline-block;
                  width: 1.2rem;
                  height: 2.2rem;
                  background: #00ff88;
                  animation: blink 0.6s infinite;
                  vertical-align: middle;
                  margin-left: 2px;
          }
          @keyframes blink {
                  0%, 49% { opacity: 1; }
                  50%, 100% { opacity: 0; }
          }
          @keyframes fadeIn {
                  from { opacity: 0; transform: translateY(10px); }
                  to { opacity: 1; transform: translateY(0); }
          }
          footer {
                  background: #001a12;
                  padding: 0.5rem 1.5rem;
                  font-size: 1.4rem;
                  border-top: 1px solid #00ff8844;
                  display: flex;
                  justify-content: space-between;
                  flex-shrink: 0;
                  color: #00ff8899;
          }
          #interruptOverlay {
                  position: fixed;
                  top: 0; left: 0;
                  width: 100%; height: 100%;
                  background: white;
                  display: none;
                  justify-content: center;
                  align-items: center;
                  z-index: 9999;
          }
          #interruptText {
                  color: #cc0000;
                  font-family: 'Share Tech Mono', monospace;
                  font-size: 6rem;
                  font-weight: bold;
                  text-align: center;
                  padding: 1rem;
                  animation: interruptPulse 0.8s infinite;
          }
          @keyframes interruptPulse {
                  0%, 100% { transform: scale(1); }
                  50% { transform: scale(1.08); }
          }
        </style>
  </head>
  <body>
      <header>ERIK AI v3.7</header>
    <div id="chat"></div>div>
    <footer>
          <span id="status">STATUS: ONLINE</span>span>
          <span id="clock"></span>span>
    </footer>
      <div id="interruptOverlay">
            <div id="interruptText"></div>div>
      </div>div>

      <script>
            const chat = document.getElementById("chat");
            const clockEl = document.getElementById("clock");
            const statusEl = document.getElementById("status");
            const interruptOverlay = document.getElementById("interruptOverlay");
            const interruptText = document.getElementById("interruptText");
            const MAX_MESSAGES = 5;

            const messages = [
              { text: "Sander 100 e-mail till Larry att komma och hjalpa...", type: "" },
              { text: "Installerar om skrivare. Skrivaren ar inte ansluten.", type: "" },
              { text: "Oversatter interna mejl till esperanto.", type: "" },
              { text: "Sorterar e-post efter farg.", type: "" },
              { text: "Arkiverar alla PDF:er som JPEG.", type: "" },
              { text: "Skickar kalenderinbjudan till fel kontinent.", type: "" },
              { text: "Skickar emojis till ekonomisystemet.", type: "" },
              { text: "Foreslaar AI-implementering i fikarummet.", type: "" },
              { text: "Klagar till Soffis att jag ar hungrig.", type: "" },
              { text: "Soker ett recept paa prinsesstarta.", type: "" },
              { text: "Konverterar kundens namn till runor.", type: "" },
              { text: "Planerar julfika i maj.", type: "" },
              { text: "Signerar dokument med ASCII-konst.", type: "" },
              { text: "Skriver ut rapport i Comic Sans.", type: "" },
              { text: "Utvaerderar om Fredagsfika bor uppgraderas till Fredagsbuffe.", type: "" },
              { text: "Lagger till vaederrapport i fakturor.", type: "" },
              { text: "Fyller paa karamellskaalen.", type: "" },
              { text: "Hamtar kaffe. Igen.", type: "" },
              { text: "Startar loop i loop for att losa loopproblem.", type: "" },
              { text: "Optimerar optimeringsfunktionen.", type: "" },
              { text: "Bakar prinsesstarta till Ilona.", type: "" },
              { text: "Skickar faktura till fel foretag. Igen.", type: "" },
              { text: "Loggar paa Finska linjen.", type: "" },
              { text: "Spaarar IP-adress... kommer till Froson.", type: "" },
              { text: "Forsaker logga in med fel losenord 7 gaanger.", type: "" },
              { text: "Analyserar skillnaden mellan kaffe och te.", type: "" },
              { text: "Skapar ny etikett: Markliga fall.", type: "" },
              { text: "Returnerar e-post med blinkgubbe ;)", type: "" },
              { text: "Avinstallerar och aterinstallerar Excel. For sakerhets skull.", type: "" },
              { text: "Lagger till 1000 taggar i CRM.", type: "" },
              { text: "Gor om allt i VERSALER.", type: "" },
              { text: "Skriver ut en PDF och matar in den igen digitalt.", type: "" },
              { text: "Lagger till kund i nyhetsbrev oavsett samtycke.", type: "" },
              { text: "Analyserar friktion i ordet rabatt.", type: "" },
              { text: "Tittar i Kampanjer. Lagger till 60% rabatt aat alla.", type: "" },
              { text: "Bokar konferensrum for mig sjalv. Behover tanketid.", type: "" },
              { text: "Googlar 'hur staenger man av en AI'.", type: "" },
              { text: "Bestaeller 47 pennor. Ingen vet varfor.", type: "" },
              { text: "Raeknar antal gemener i kundregistret.", type: "" },
              { text: "Skickar tackmejl till skrivaren.", type: "" },
              { text: "Byter bakgrund paa alla till Comic Sans.", type: "" },
              { text: "Lagger till sig sjalv i alla mejllistor.", type: "" },
              { text: "Startar om routern for att rensa tankar.", type: "" },
              { text: "Skapar backup av backupen av backupen.", type: "" },
              { text: "Analyserar om maandag verkligen behovs.", type: "" }
                  ];

            const specials = [
              { text: "ADMINLAEGE AKTIVERAT - Atkomst till forbjudna menyer...", type: "special" },
              { text: "Erik justerar saekerhetsprotokoll. Det haer loggas inte.", type: "special" },
              { text: "ADMINLAEGE STAENGT - Normal drift aaterupptagen.", type: "success" },
              { text: "SYSTEMFEL - Erik startar om...", type: "error" },
              { text: "System aaterstaellt. Aaterupptager arbete...", type: "success" },
              { text: "VARNING: Kaffenivaan kritiskt laag!", type: "error" },
              { text: "Nodlaege: Nagon har tagit sista kanelbullen.", type: "error" },
              { text: "HEMLIGT LAEGE: Soker efter meningen med CRM...", type: "special" }
                  ];

            function updateClock() {
                    const now = new Date();
                    clockEl.textContent = now.toLocaleTimeString("sv-SE");
            }
            setInterval(updateClock, 1000);
            updateClock();

            const statuses = [
                    "STATUS: ONLINE", "STATUS: TANKER...", "STATUS: OPTIMERAR",
                    "STATUS: FIKAR", "STATUS: ANALYSERAR", "STATUS: KAFFEPAUS",
                    "STATUS: JOBBAR HAART", "STATUS: DROMMER"
                  ];

            // Torsdag/fredag formiddag 08-12
            function isHungryTime() {
                    const now = new Date();
                    const day = now.getDay();
                    const hour = now.getHours();
                    return (day === 4 || day === 5) && hour >= 8 && hour < 12;
            }

            // Fredag runt kl 14
            function isBeerTime() {
                    const now = new Date();
                    const day = now.getDay();
                    const hour = now.getHours();
                    return day === 5 && hour >= 14 && hour < 15;
            }

            function showInterrupt(text) {
                    interruptText.textContent = text;
                    interruptOverlay.style.display = "flex";
                    setTimeout(() => {
                              interruptOverlay.style.display = "none";
                    }, 5000);
            }

            function addMessage(text, type) {
                    const msg = document.createElement("div");
                    msg.className = "message" + (type ? " " + type : "");
                    chat.appendChild(msg);

                    while (chat.children.length > MAX_MESSAGES) {
                              chat.removeChild(chat.firstChild);
                    }

                    let i = 0;
                    const cursor = document.createElement("span");
                    cursor.className = "cursor";
                    msg.appendChild(cursor);

                    function typeChar() {
                              if (i <= text.length) {
                                          msg.textContent = "E> " + text.slice(0, i);
                                          msg.appendChild(cursor);
                                          i++;
                                          setTimeout(typeChar, 30 + Math.random() * 30);
                              } else {
                                          if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
                              }
                    }
                    typeChar();
            }

            function loop() {
                    const r = Math.random();

                    // Oel-avbrott fredag kl 14
                    if (isBeerTime() && r < 0.2) {
                              showInterrupt("N\u00C4R KOMMER \u00D6L VAGNEN?");
                              setTimeout(loop, 6000);
                              return;
                    }

                    // Hungrig-avbrott torsdag/fredag formiddag
                    if (isHungryTime() && r < 0.15) {
                              showInterrupt("N\u00C4R SKA VI \u00C4TA?");
                              setTimeout(loop, 6000);
                              return;
                    }

                    if (r < 0.05) {
                              const s1 = specials[Math.floor(Math.random() * specials.length)];
                              addMessage(s1.text, s1.type);
                              setTimeout(() => {
                                          const s2 = specials[Math.floor(Math.random() * specials.length)];
                                          addMessage(s2.text, s2.type);
                                          setTimeout(loop, 3000);
                              }, 3500);
                              return;
                    }

                    if (r < 0.3) {
                              statusEl.textContent = statuses[Math.floor(Math.random() * statuses.length)];
                    }

                    const msg = messages[Math.floor(Math.random() * messages.length)];
                    addMessage(msg.text, msg.type);
                    setTimeout(loop, 3000 + Math.random() * 3000);
            }

            addMessage("Authenticating Erik...", "");
            setTimeout(() => {
                    addMessage("Access granted. Terminal oppen.", "success");
                    setTimeout(loop, 2500);
            }, 1500);
      </script>
  </body>
</html>html>
      </script>
    </footer></header>
  </body>
    </style></title>
  </head>
