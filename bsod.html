<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSOD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0078d7; color: white; font-family: "Segoe UI", Arial, sans-serif;
      height: 100vh; display: flex; flex-direction: column; justify-content: center;
      align-items: center; padding: 60px; overflow: hidden; }
    .sad { font-size: 8rem; margin-bottom: 30px; }
    .title { font-size: 1.8rem; margin-bottom: 15px; }
    .info { font-size: 1.1rem; color: #cce0ff; margin-bottom: 8px; max-width: 700px; }
    .percent { font-size: 1.3rem; margin-top: 30px; margin-bottom: 20px; }
    .qr { width: 100px; height: 100px; background: white; margin: 20px 0;
      display: flex; align-items: center; justify-content: center; }
    .qr-inner { width: 80px; height: 80px;
      background: repeating-conic-gradient(#000 0% 25%, #fff 0% 50%) 0 0/10px 10px; }
    .stopcode { font-size: 0.9rem; color: #99c2ff; margin-top: 15px; font-family: monospace; }
    .details { font-size: 0.85rem; color: #80b3ff; margin-top: 8px;
      font-family: monospace; max-width: 700px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="sad">:(</div>
  <div class="title">Din dator fick ett problem och maste startas om.</div>
  <div class="info">Vi samlar bara in felinformation, sen startar vi om datorn at dig.</div>
  <div class="percent" id="pct">0% klart</div>
  <div style="display:flex;align-items:flex-start;gap:20px;margin-top:10px;">
    <div class="qr"><div class="qr-inner"></div></div>
    <div>
      <div class="stopcode" id="stopcode"></div>
      <div class="details" id="details"></div>
    </div>
  </div>
<script>
var errors = [
  {stop:"ERIK_COFFEE_OVERFLOW",detail:"Felaktig minnesallokering i KAFFE.DLL. Erik har druckit 14 koppar idag. Stacken ar full av koffein. Kontakta din systemadministrator eller ge Erik decaf."},
  {stop:"SNACK_THEFT_DETECTED",detail:"Kritiskt fel i KONTOR.SYS - obehoring aatkomst av snackslaadan. Fingeravtryck matchar ERIK_STRAND.EXE (PID: 1337). Alla chips ar borta."},
  {stop:"EXCEL_SKILLS_NOT_FOUND",detail:"Windows kan inte hitta VLOOKUP.DLL. ERIK_STRAND.EXE forsokte anvanda Excel men kraschade vid rad 3. Filen Budget_Final_FINAL_v7_RIKTIG.xlsx ar korrupt."},
  {stop:"DAD_JOKE_BUFFER_OVERFLOW",detail:"Systemminnet ar fullt av ordvitsar. ERIK_HUMOR.DLL har skrivit over kritiska systemfiler med kalenderbitsar. Senaste joke: Vad sa dansen? JAG KAN INTE WALTZ MER!"},
  {stop:"FRIDAY_ANTICIPATION_FAULT",detail:"VECKODAG.SYS rapporterar att det ar tisdag men ERIK_STRAND.EXE beter sig som det ar fredag. Felkod: 0xF4IDAG. Rekommendation: Starta om veckan."},
  {stop:"ALBATROS_TRAVEL_EXCEPTION",detail:"Kritiskt fel: ERIK har bokat en resa till Maldiverna pa personalrabatten IGEN. BUDGET.DLL returnerar NaN. Kontorsratten ar inte imponerad."}
];
var err = errors[Math.floor(Math.random()*errors.length)];
document.getElementById("stopcode").textContent = "Stoppkod: "+err.stop;
document.getElementById("details").textContent = err.detail;
var pct=0, pctEl=document.getElementById("pct");
var iv = setInterval(function(){
  pct += Math.floor(Math.random()*3)+1;
  if(pct>100) pct=100;
  pctEl.textContent = pct+"% klart";
  if(pct>=100){ clearInterval(iv);
    setTimeout(function(){document.body.style.transition="opacity 1s";document.body.style.opacity="0";},2000);
  }
},800);
</script>
</body>
</html>
